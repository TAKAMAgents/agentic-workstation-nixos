name: Nightly

"on":
  workflow_dispatch:
  schedule:
    - cron: "42 4 * * *"

jobs:
  nixos-profiles:
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
    strategy:
      fail-fast: false
      matrix:
        profile:
          - minimal
          - coding-agent
          - factory
          - security
          - local-llm
          - openclaw-server
    steps:
      - uses: actions/checkout@v5
      - name: Install Nix
        run: |
          sudo install -d -m 0755 -o "$USER" -g "$USER" /nix
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
      - name: Evaluate profile module
        run: |
          nix eval --impure --raw --expr "
          let
            flake = builtins.getFlake \"path:$PWD\";
            nixpkgs = builtins.getFlake \"github:NixOS/nixpkgs/nixos-unstable\";
            host = nixpkgs.lib.nixosSystem {
              system = \"x86_64-linux\";
              modules = [
                flake.nixosModules.default
                {
                  boot.loader.grub.enable = false;
                  fileSystems.\"/\" = {
                    device = \"none\";
                    fsType = \"tmpfs\";
                  };
                  system.stateVersion = \"26.05\";
                  nixpkgs.config.allowUnfreePredicate = pkg:
                    builtins.elem (nixpkgs.lib.getName pkg) [ \"1password-cli\" ];
                  programs.agentic-workstation = {
                    enable = true;
                    profile = \"${{ matrix.profile }}\";
                  };
                }
              ];
            };
          in
          host.config.system.build.toplevel.drvPath
          "

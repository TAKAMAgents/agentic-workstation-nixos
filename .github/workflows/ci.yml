name: CI

"on":
  push:
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt pre-commit yamllint jq bats golang-go
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          rustup component add rustfmt clippy
      - name: Syntax check
        run: bash -n install-agentic-tools.sh scripts/*.sh cloud/*.sh
      - name: ShellCheck
        run: shellcheck install-agentic-tools.sh scripts/*.sh cloud/*.sh
      - name: shfmt
        run: shfmt -i 2 -ci -d install-agentic-tools.sh scripts/*.sh cloud/*.sh
      - name: actionlint
        run: /home/runner/go/bin/actionlint
      - name: yamllint
        run: yamllint .
      - name: pre-commit
        run: pre-commit run --all-files

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install unit test tools
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Bats
        run: bats tests/unit

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: Rust formatting
        run: cargo fmt --check
      - name: Rust lints
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --all-targets --all-features
      - name: Lockfile validation
        run: cargo run -- verify-lockfile

  nix:
    runs-on: ubuntu-latest
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
    steps:
      - uses: actions/checkout@v5
      - name: Install Nix
        run: |
          sudo install -d -m 0755 -o "$USER" -g "$USER" /nix
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          nix --version
      - name: Build package
        run: nix build
      - name: Run validation app
        run: nix run .#check
      - name: Run Nix e2e smoke
        run: nix run .#e2e
      - name: Check flake outputs
        run: nix flake check --no-build
      - name: Evaluate NixOS module
        run: |
          nix eval --impure --raw --expr "
          let
            flake = builtins.getFlake \"path:$PWD\";
            nixpkgs = builtins.getFlake \"github:NixOS/nixpkgs/nixos-unstable\";
            host = nixpkgs.lib.nixosSystem {
              system = \"x86_64-linux\";
              modules = [
                flake.nixosModules.default
                {
                  boot.loader.grub.enable = false;
                  fileSystems.\"/\" = {
                    device = \"none\";
                    fsType = \"tmpfs\";
                  };
                  system.stateVersion = \"26.05\";
                  nixpkgs.config.allowUnfreePredicate = pkg:
                    builtins.elem (nixpkgs.lib.getName pkg) [ \"1password-cli\" ];
                  programs.agentic-workstation.enable = true;
                }
              ];
            };
          in
          host.config.system.build.toplevel.drvPath
          "
      - name: Realize named dev shells
        run: |
          nix develop .#minimal --command true
          nix develop .#coding-agent --command true
